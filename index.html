<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Game Engine (Frank's Laboratory)</title>

    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" type="image/x-icon" href="assets/img/icon.png" />
</head>

<body>
    <div id="container">
        <canvas id="screen"></canvas>

        <div id="mainmenu" class="ui-panel active">
            <h1>Starter Engine</h1>
            <button id="btnPlay">Play</button>
            <div style="margin-top: 20px; font-size: 12px;">
                <div>WASD - Move</div>
                <div>ESC - Pause</div>
            </div>
            
        </div>
        <div id="pausemenu" class="ui-panel">
            <h2>PAUSED</h2>
            <button id="btnResume">Resume</button>
            <button id="btnQuit">Quit To Main Menu</button>
        </div>
        <div id="loading" class="ui-panel">
            <h2>Loading...</h2>
            <button id="btnResume">Resume</button>
            <p>Sharpening the pixels...</p>
        </div>
    </div>
</body>

<!--
    type="module" to enable modern Javascript features like imports and exports
    also allows us to split functionality into smaller, organized files that can
    share data with each other
-->
<script type="module" src="js/main.js"></script>
</html>
